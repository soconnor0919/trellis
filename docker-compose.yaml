services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-/data/db.sqlite}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    volumes:
      - db-data:/data
      - uploads:/app/public/uploads
    restart: unless-stopped

volumes:
  db-data:
  uploads:
